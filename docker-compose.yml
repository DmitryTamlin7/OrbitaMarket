services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres-Orbita
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: orbita_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infrastructure/db-init:/docker-entrypoint-initdb.d

  kafka:
    image: bitnami/kafka:3.4
    container_name: orbita_kafka
    environment:
      KAFKA_ENABLE_KRAFT: 'yes'
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      ALLOW_PLAINTEXT_LISTENER: 'yes'
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/bitnami/kafka

  api-gateway:
    build: .api/gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - orders-service
      - payment-service

  orders-service:
    build: ./orders-service
    container_name: orbita_orders
    environment:
        SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/orders_db
        SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - postgres
      - kafka

  payments-service:
    build: ./payments-service
    container_name: orbita_payments
    environment:
        SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payments_db
        SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - postgres
      - kafka

volumes:
  pg_data:
  kafka_data:
